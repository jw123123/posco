<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>애니메이션 현대첨단소재 Hyundai Advanced Materials</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', 'Pretendard Variable', sans-serif;
    }

    .container, .container-s {
      margin: 30px 0;
      background-color: #ccc;
      overflow: hidden;
    }

    .txt {
      font-size: 86px;
      font-weight: bold;
      animation: mask-slogan-ani 4s both infinite;
      /* 
      transition: color 0.3s 0.2s
      transition-property: color;
      transition-duration: 0.3s;
      transition-delay: 0.2s;
      animation은 transition 쪽에 애니메이션으로 들어감
      */
    }
    
    .txt-s {
      font-size: 20px;
      animation: mask-slogan-s-ani 4s both infinite;
      /* 
      both - 양쪽 키프레임 애니메이션에 오브젝트 모양을 맞추라는 의미(infinite 들어가면 상관 없지만, delay 들어가면 원래의 오브젝트가 나온 후 애니메이션이 시작 되기 때문에 잡아줘야함)
      forward - 뒤쪽 프레임만 맞추는
      backward - 앞쪽 프레임만 맞추는
      */
    }
    .scroll {
      position: fixed;
      right: 100px;
      bottom: 100px;
      width: 100px;
      height: 100px;
      background-color: #000;
    }
    .emblem {
      width: 100%;
      height: 100%;
      background: url('images/scroll_down.svg') center center /contain no-repeat;
      animation: rotate-ani 4s linear infinite;
    }
    .mouse {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 22px;
      height: 40px;
      border-radius: 11px;
      /* 
      1. 보더에 그레디언트 적용 : 각도 설정 가능하지만 그외는 대부분(위치 이동, scale 조절, 애니메이션) 불가능, 배경이미지 처리와 다름, 반지름에 적용 불가능
      border-image-source: linear-gradient();
      border-image slice : 1(한번만 깔리라는 의미, 높이를 1로 맞추라는 의미(그레디언트 색깔로 border 전체 채움))
      */
      /* 실제 필요한 소스는 아래 두 줄
      border: 2px solid transparent;
      border-image: linear-gradient(to bottom, red 0%, blue 100%) 1; */
      
      /* 안쪽에 배경색이 지정되도 상관없을 때 다중 배경이미지 설계
      border: 2px solid transparent;
      background-image: linear-gradient(to bottom, #ccc 0%, #ccc 100%), linear-gradient(to bottom, rgba(255,255,255,1) 50%, rgba(255,255,255,0.3) 51%);
      repeat를 따로 설정하지 않아 gradient색이 패턴처럼 반복됨
      background-clip: padding-box, border-box;
      background-position: 0 -2px;
      background-size: auto calc(200% + 8px); */
      transform: translate(-50%, -50%); 
    }
    .mouse:before { /* 마우스 안쪽 도형 마스크 */
      position: absolute;
      inset: 0;
      /* inset - left,right,top,bottom 모두 0, 너비와 높이를 100%로 설계한 것과 동일(애니메이션 사용할 땐 inset을 사용하는게 좋음) */
      padding: 2px;
      border-radius: inherit;
      background-image:linear-gradient(to bottom, rgba(255,255,255,1) 50%, rgba(255,255,255,0.3) 51%);
      background-size: auto 200%;
      -webkit-mask: linear-gradient(#f00 0 0) content-box, linear-gradient(#f00 0 0); /* 영역디자인만 한 것 */
      mask: linear-gradient(#f00 0 0) content-box, linear-gradient(#f00 0 0);
      /* 
      webkit(밴더프리픽스(브라우저 공급업체 접두사)) - chrome, safari에서 사용하기 위해서 꼭 들어가야 하는 함수(없으면 실행되지 않음) / 옛날 브라우저에서 실행이 안됨
      mask - 이미지, linear함수가 들어감 
      */
      -webkit-mask-composite: xor;
      /* 둘다 써줘야 모든 브라우저에서 실행 가능 */
      mask-composite: exclude;
      content: '';
      /* animation: mouse-line-ani 1.5s alternate infinite; */
    }
    .mouse:after { /*동그라미 위아래 마이크로 모션 */
      position: absolute;
      left: 50%;
      top: 15%;
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: #fff;
      transform: translateX(-50%);
      animation: mouse-dot-ani 1.5s;
      animation-direction: alternate;
      /* 
      reverse - 앞, 뒤 프레임이 반대로 됨 
      alternate - 왕복운동(왕복운동 하려면 2번 이상 루프해야 제대로 실행됨)
      */
      animation-iteration-count: infinite;
      /* 2화 반복하려면 반복회수 4 */
    }

    /* 인터랙션 */



    /* 애니메이션 */
    @keyframes mask-slogan-ani {
      from {transform: translateY(100%); opacity: 0;}
      25% {transform: translateY(0); opacity: 1;}
      75% {transform: translateY(0); opacity: 1;}
      to {transform: translateY(100%); opacity: 0;}
        /* 
        from{}
        to {} 로 작성해도 되고 %로 작성 가능
        */
      }
      @keyframes mask-slogan-s-ani {        
        from {transform: translateY(100%); opacity: 0;}
        25% {transform: translateY(100%); opacity: 0;}
        50% {transform: translateY(0); opacity: 1;}
        75% {transform: translateY(0); opacity: 1;}
        to {transform: translateY(100%); opacity: 0;}
      }
      @keyframes rotate-ani {
        from {transform: rotate(0deg);}
        to {transform: rotate(360deg);}
      }
      @keyframes mouse-dot-ani {
        from {top: 15%; width: 6px; height: 6px; opacity: 1;}
        to {top: 80%; width: 3px; height: 3px; opacity: 0.3;}
      }
      @keyframes mouse-line-ani {
        from {background-position: 0 0;}
        to {background-position: 0 100%;}
      }
  </style>
</head>

<body>
  <div class="container">
    <div class="txt">Creating a New Future</div>
    <!-- span으로 하면 한 글자씩 애니메이션 가능 -->
  </div>
  <div class="container-s">
    <div class="txt-s">무한한 가능성으로 새로운 미래를 만듭니다.</div>
  </div>
  <div class="scroll">
    <div class="emblem"></div>
    <div class="mouse"></div>
  </div>
</body>

</html>
